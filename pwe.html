<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pendulum wave effect</title>
    <style>
    *{ margin:0; padding: 0; } 
    </style>
</head>
<body>
    <canvas> </canvas>
  <script>
        var canvas =  document.querySelector('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        var c = canvas.getContext('2d');
        
     //circle posistions
    var cx = []; 
    var cy = [];
    var counter = 20;
    for(i=0;i<=12;i++){
       cx[i] = 20;
       cy[i] = counter;
       counter = counter + 40;
       //console.log("cx ["+i +"] :"+ cx[i]);
       //console.log("cy ["+i +"] :"+ cy[i]);
       //console.log('');
       } 

       // velocity of circles dx
        var dx = [];
        var dxcounter = 7.8;
        for (i=0;i<=12;i++){
              dx[i] = dxcounter ;
              dxcounter = dxcounter - .2;
              //console.log("dx["+i+"] ="+dx[i]);
              }
        function move(){ 
        c.clearRect(0,0,innerWidth,innerHeight);
        requestAnimationFrame(move);
             
                function circle(x,y){
                    c.beginPath();
                    c.strokeStyle="000000";
                    c.arc(x ,y,20,0,Math.PI*2,false);  
                    c.stroke();
                }
                for(i=0;i<=12;i++){
                    circle(cx[i],cy[i]);    
                }
                //condition to bounce within the view area
                for(i=0;i<=12;i++){
                    if(cx[i]+50 > innerWidth || cx[i] < 0){
                    dx[i]=-dx[i];
                }}
                // change in x position for circles
                for(i=0;i<=12;i++){
                    cx[i]=dx[i]+cx[i];
                }
                } // end of function move()
move(); //function call

//276 lines reduced to 69 lines using functions and array.
    </script>
</body>
</html>
